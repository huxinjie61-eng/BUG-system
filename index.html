<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日期计算器</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#6366f1; --accent2:#22d3ee;
    --good:#34d399; --bad:#fb7185;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; font-family:'Segoe UI',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 20% -10%,#1e293b 0%,var(--bg) 60%);
    color:var(--txt); display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:880px; background:linear-gradient(180deg,var(--panel),#172033);
    border:1px solid #2a3a55; border-radius:20px; padding:32px; box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
  }
  h1{margin:0 0 6px;font-size:26px;font-weight:700}
  .sub{color:var(--muted);margin:0 0 28px;font-size:14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
  @media (max-width:640px){.grid{grid-template-columns:1fr}}
  .field{background:#0d1530;border:1px solid #2a3a55;border-radius:14px;padding:16px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase}
  .row{display:flex;gap:8px;align-items:center}
  input[type=date]{flex:1;background:#1b2740;border:1px solid #2a3a55;color:var(--txt);
    padding:10px 12px;border-radius:10px;font-size:15px;outline:none}
  input[type=date]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.25)}
  .seg{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .seg button{background:#1b2740;border:1px solid #2a3a55;color:var(--muted);
    padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:.15s}
  .seg button:hover{color:var(--txt);border-color:var(--accent)}
  input[type=text]{flex:1;background:#1b2740;border:1px solid #2a3a55;color:var(--txt);
    padding:10px 12px;border-radius:10px;font-size:15px;outline:none;font-family:inherit}
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.25)}
  .ymd{gap:6px}
  .ymd select{flex:1;background:#1b2740;border:1px solid #2a3a55;color:var(--txt);
    padding:9px 4px;border-radius:10px;font-size:14px;outline:none;cursor:pointer;text-align:center}
  .ymd select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.25)}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}

  /* slider */
  .slider-wrap{background:#0d1530;border:1px solid #2a3a55;border-radius:14px;padding:20px 20px 24px}
  .slider-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .slider-head label{font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .range-values{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}
  .range-values span{color:var(--accent2);font-weight:600}
  .track{position:relative;height:62px;margin:6px 4px}
  .track .bar{position:absolute;top:20px;left:0;right:0;height:6px;background:#1b2740;border-radius:6px;overflow:hidden}
  .track .sel{position:absolute;top:0;height:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px}
  .ticks{position:absolute;top:28px;left:0;right:0;height:32px;pointer-events:none}
  .tick{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
  .tick-line{width:1px;height:7px;background:#475569}
  .tick-label{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap}
  .tick.major .tick-line{background:var(--accent2);height:9px}
  .tick.major .tick-label{color:var(--accent2);font-weight:600}
  .tick.today .tick-label{color:#fbbf24;font-weight:700}

  .tip{position:fixed;z-index:60;pointer-events:none;display:none;
    background:#0b1226;border:1px solid var(--accent);color:#fff;
    padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.55);white-space:nowrap;
    transform:translate(-50%,calc(-100% - 14px))}
  .tip::after{content:'';position:absolute;left:50%;top:100%;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--accent)}
  .track input[type=range]{position:absolute;top:14px;left:0;width:100%;-webkit-appearance:none;background:transparent;pointer-events:none;margin:0;height:18px}
  .track input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;pointer-events:auto;width:20px;height:20px;border-radius:50%;
    background:#fff;border:3px solid var(--accent);cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .track input[type=range]::-moz-range-thumb{pointer-events:auto;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--accent);cursor:grab}
  .track input[type=range]:active::-webkit-slider-thumb{cursor:grabbing}

  /* result */
  .result{margin-top:26px;background:linear-gradient(135deg,#312e81,#1e3a8a);border:1px solid #4338ca;
    border-radius:16px;padding:28px;text-align:center}
  .result .big{font-size:54px;font-weight:800;letter-spacing:-1px;line-height:1}
  .result .unit{font-size:18px;color:var(--muted);margin-left:8px}
  .result .desc{color:#c7d2fe;margin-top:10px;font-size:14px}
  .result .break{display:flex;gap:18px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .result .break div{background:rgba(255,255,255,.08);padding:10px 16px;border-radius:10px;min-width:96px}
  .result .break .n{font-size:20px;font-weight:700}
  .result .break .l{font-size:11px;color:var(--muted);text-transform:uppercase}
  .neg{color:var(--bad)}
</style>
</head>
<body>
<div class="card">
  <h1>📅 日期计算器</h1>
  <p class="sub">计算两个日期之间相差的天数 · 支持多种输入方式</p>

  <div class="grid">
    <!-- 起始日期 -->
    <div class="field">
      <label>起始日期</label>
      <div class="seg">
        <button data-tgt="start" data-what="today">今天</button>
        <button data-tgt="start" data-what="-7">-7天</button>
        <button data-tgt="start" data-what="+30">+30天</button>
      </div>
      <div class="row ymd">
        <select id="startYear"></select>
        <select id="startMonth"></select>
        <select id="startDay"></select>
      </div>
    </div>

    <!-- 结束日期 -->
    <div class="field">
      <label>结束日期</label>
      <div class="seg">
        <button data-tgt="end" data-what="today">今天</button>
        <button data-tgt="end" data-what="+90">+90天</button>
        <button data-tgt="end" data-what="+400">+400天</button>
      </div>
      <div class="row ymd">
        <select id="endYear"></select>
        <select id="endMonth"></select>
        <select id="endDay"></select>
      </div>
    </div>
  </div>

  <!-- 刻度滑块 -->
  <div class="slider-wrap">
    <div class="slider-head">
      <label>刻度滑块（默认起点=今天，向后 400 天）</label>
      <div class="range-values">
        <span id="thumbStart">—</span> <span style="color:var(--muted)">→</span> <span id="thumbEnd">—</span>
      </div>
    </div>
    <div class="track" id="track">
      <div class="bar"><div class="sel" id="sel"></div></div>
      <div class="ticks" id="ticks"></div>
      <input type="range" id="r1" min="0" max="400" value="0">
      <input type="range" id="r2" min="0" max="400" value="400">
    </div>
    <div class="hint">拖动两个滑块选择日期范围。两个滑块可互换起止。</div>
  </div>
  <div class="tip" id="tip"></div>

  <!-- 结果 -->
  <div class="result">
    <div><span class="big" id="bigDays">0</span><span class="unit">天</span></div>
    <div class="desc" id="desc">请选择两个日期</div>
    <div class="break" id="break"></div>
  </div>
</div>

<script>
const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const MAXD = 400; // 滑块跨度天数

const $ = id => document.getElementById(id);
const r1=$('r1'), r2=$('r2');
const sY=$('startYear'), sM=$('startMonth'), sD=$('startDay');
const eY=$('endYear'),   eM=$('endMonth'),   eD=$('endDay');

// 年份范围：今天前 5 年 ~ 后 2 年
const YMIN=TODAY.getFullYear()-5, YMAX=TODAY.getFullYear()+2;

// ---- 工具 ----
function fmt(d){ // yyyy-mm-dd
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);x.setHours(0,0,0,0);return x;}
function daysBetween(a,b){return Math.round((b-a)/86400000);}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}

// ---- 下拉框填充 ----
function fillYearMonth(){
  [sY,eY].forEach(sel=>{
    sel.innerHTML='';
    for(let y=YMIN;y<=YMAX;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'年';sel.appendChild(o);}
  });
  [sM,eM].forEach(sel=>{
    sel.innerHTML='';
    for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';sel.appendChild(o);}
  });
}
function fillDays(sel,y,m){
  const keep=+sel.value;
  sel.innerHTML='';
  const n=daysInMonth(y,m);
  for(let d=1;d<=n;d++){const o=document.createElement('option');o.value=d;o.textContent=d+'日';sel.appendChild(o);}
  if(keep&&keep<=n) sel.value=keep;
}
function setSelects(Y,M,D,d){
  Y.value=d.getFullYear(); M.value=d.getMonth()+1;
  fillDays(D,d.getFullYear(),d.getMonth()+1);
  D.value=d.getDate();
}
function readSelects(Y,M,D){ // 读取并自愈：月份切换后天数自动夹紧
  const y=+Y.value, m=+M.value;
  fillDays(D,y,m);
  return new Date(y,m-1,+D.value);
}

// ---- 核心状态 ----
let curStart=null, curEnd=null; // Date 对象

function setStart(d){
  curStart=d;
  if(d) setSelects(sY,sM,sD,d);
  syncSliders(); compute();
}
function setEnd(d){
  curEnd=d;
  if(d) setSelects(eY,eM,eD,d);
  syncSliders(); compute();
}

// ---- 滑块 ----
function dateToSlider(d){
  if(!d) return null;
  const diff = daysBetween(TODAY, d);
  if(diff<0) return 0;
  if(diff>MAXD) return MAXD;
  return diff;
}
function sliderToDate(v){ return addDays(TODAY, +v); }

function buildTicks(){
  const t=$('ticks'); t.innerHTML='';
  // 按自然月：从本月1号起，逐月推进，直到超过 MAXD 天
  let cursor=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  while(true){
    const off=daysBetween(TODAY,cursor);
    if(off>MAXD) break;
    if(off>=0){
      const isToday = off===0;
      const el=document.createElement('div');
      el.className='tick'+(isToday?' today':'');
      el.style.left=(off/MAXD*100)+'%';
      el.innerHTML=`<div class="tick-line"></div>
        <div class="tick-label">${isToday?'今天':(cursor.getMonth()+1)+'月'}</div>`;
      t.appendChild(el);
    }
    cursor=new Date(cursor.getFullYear(),cursor.getMonth()+1,1);
  }
}
function updateSel(){
  let a=+r1.value, b=+r2.value;
  let lo=Math.min(a,b), hi=Math.max(a,b);
  const sel=$('sel');
  const pct = v => (v/MAXD*100);
  sel.style.left = pct(lo)+'%';
  sel.style.width = (pct(hi)-pct(lo))+'%';
}
function syncSliders(){
  // 根据当前 start/end 反推滑块位置（若日期超出 0~400 范围则夹紧）
  const s = curStart? dateToSlider(curStart) : 0;
  const e = curEnd? dateToSlider(curEnd) : MAXD;
  // 保证两滑块分代表 start/end（用顺序而非值大小）
  r1.value = curStart? s : 0;
  r2.value = curEnd? e : MAXD;
  updateSel();
  $('thumbStart').textContent = curStart? fmt(curStart) : '—';
  $('thumbEnd').textContent = curEnd? fmt(curEnd) : '—';
}
function onSlider(){
  // 先读两个滑块值，避免 setStart/setEnd 内部 syncSliders 把另一个滑块重置回旧值
  const sv = +r1.value, ev = +r2.value;
  curStart = sliderToDate(sv);
  curEnd   = sliderToDate(ev);
  setSelects(sY,sM,sD,curStart);
  setSelects(eY,eM,eD,curEnd);
  $('thumbStart').textContent = fmt(curStart);
  $('thumbEnd').textContent   = fmt(curEnd);
  compute();
}

// ---- 计算 ----
function compute(){
  if(!curStart||!curEnd){
    $('bigDays').textContent='—';
    $('desc').textContent='请选择两个日期';
    $('break').innerHTML='';
    return;
  }
  let diff = daysBetween(curStart,curEnd);
  $('bigDays').textContent = diff;
  $('bigDays').className = 'big'+(diff<0?' neg':'');
  $('desc').innerHTML =
    `<b>${fmt(curStart)}</b> ${diff<0?'早于':'相距'} <b>${fmt(curEnd)}</b>` +
    (diff<0?'（结束早于起始）':'');
  $('break').innerHTML = '';
}

// ---- 事件绑定 ----
function onSelStart(){ curStart=readSelects(sY,sM,sD); syncSliders(); compute(); }
function onSelEnd(){   curEnd  =readSelects(eY,eM,eD); syncSliders(); compute(); }
[sY,sM,sD].forEach(s=>s.addEventListener('change',onSelStart));
[eY,eM,eD].forEach(s=>s.addEventListener('change',onSelEnd));

document.querySelectorAll('.seg button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tgt=btn.dataset.tgt, what=btn.dataset.what;
    const d = what==='today' ? TODAY : addDays(TODAY,+what);
    if(tgt==='start') setStart(d); else setEnd(d);
  });
});

r1.addEventListener('input',()=>{updateSel();onSlider();if(dragging)showTip(dragging);});
r2.addEventListener('input',()=>{updateSel();onSlider();if(dragging)showTip(dragging);});

// ---- 拖动悬浮窗 ----
const tip=$('tip');
let dragging=null;       // 'r1' | 'r2'
let mouseX=0, mouseY=0;
function fmtCN(d){return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
function positionTip(){tip.style.left=mouseX+'px';tip.style.top=mouseY+'px';}
function showTip(which){
  const v=+(which==='r1'?r1.value:r2.value);
  tip.textContent=fmtCN(sliderToDate(v));
  tip.style.display='block';
  positionTip();
}
function hideTip(){tip.style.display='none';}
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;if(dragging)positionTip();});
document.addEventListener('pointermove',e=>{mouseX=e.clientX;mouseY=e.clientY;if(dragging)positionTip();});
r1.addEventListener('pointerdown',()=>{dragging='r1';showTip('r1');});
r2.addEventListener('pointerdown',()=>{dragging='r2';showTip('r2');});
window.addEventListener('pointerup',()=>{dragging=null;hideTip();});
window.addEventListener('mouseup',()=>{dragging=null;hideTip();});

// ---- 初始化 ----
buildTicks();
fillYearMonth();
setStart(TODAY);
setEnd(addDays(TODAY,400));
</script>
</body>
</html>
